<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exercício 4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Layout de Grade de Posicionamento</h1>
    <!-- PRIMEIRA LINHA -->
    <div class="linha verde">
        <div class="bloco azul">
            Esquerda em Cima
        </div>

        <div class="bloco amarelo">
            Direita em Cima
        </div>
    </div>

    <!-- SEGUNDA LINHA -->
    <div class="linha amarelo">
        <div class="bloco verde">
            Esquerda Centro
        </div>

        <div class="bloco azul">
            Direita Centro
        </div>
    </div>

    <!-- TERCEIRA LINHA -->
    <div class="linha azul">
        <div class="bloco amarelo">
            Esquerda Embaixo
        </div>

        <div class="bloco verde">
            Direita Embaixo
        </div>
    </div>
</body>
</html>
